function renderStats() {
  const total = caseData.length;
  const industryCount = new Set(caseData.map(d => d.industry)).size;
  const efficiencyCount = caseData.filter(d => d.effects.includes('效率提升')).length;
  const costCount = caseData.filter(d => d.effects.includes('成本节约')).length;
  const avgEffect = '显著';
  const stats = [
    { label: '案例总数', value: total },
    { label: '行业覆盖', value: industryCount + ' 个' },
    { label: '效率提升', value: efficiencyCount },
    { label: '成本节约', value: costCount },
    { label: '平均效果', value: avgEffect }
  ];
  document.getElementById('stats').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`
  ).join('');
}

function renderIndustryFilters() {
  const el = document.getElementById('industryFilter');
  el.innerHTML = industries.map(i =>
    `<button class="filter-btn ${i === activeIndustry ? 'active' : ''}" data-industry="${i}">${i}</button>`
  ).join('');
  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeIndustry = btn.dataset.industry;
      renderIndustryFilters();
      renderEffectFilters();
      renderAll();
    });
  });
}

function renderEffectFilters() {
  const el = document.getElementById('effectFilter');
  el.innerHTML = effects.map(e =>
    `<button class="filter-btn ${e === activeEffect ? 'active' : ''}" data-effect="${e}">${e}</button>`
  ).join('');
  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeEffect = btn.dataset.effect;
      renderIndustryFilters();
      renderEffectFilters();
      renderAll();
    });
  });
}

function getFilteredData() {
  let data = caseData;
  if (activeIndustry !== '全部') data = data.filter(d => d.industry === activeIndustry);
  if (activeEffect !== '全部') data = data.filter(d => d.effects.includes(activeEffect));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(d =>
      d.company.toLowerCase().includes(q) ||
      d.scene.toLowerCase().includes(q) ||
      d.industry.toLowerCase().includes(q) ||
      d.products.some(p => p.toLowerCase().includes(q)) ||
      d.effects.some(e => e.toLowerCase().includes(q)) ||
      d.effectText.toLowerCase().includes(q)
    );
  }
  return data;
}

function renderCard(item) {
  const color = industryColors[item.industry] || '#38bdf8';
  return `
    <div class="card" onclick="openModal(${item.id})">
      <div class="card-header">
        <div class="card-title">${item.company}</div>
        <div class="card-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">${item.industry}</div>
      </div>
      <div class="card-meta">${item.scene} · ${item.products.join(' + ')}</div>
      <div class="card-effect">
        <div class="effect-label">效果指标</div>
        <div class="effect-value">${item.effectText}</div>
      </div>
      <div class="card-tags">
        ${item.effects.map(e => `<span class="card-tag" style="color:${effectColors[e] || '#64748b'};border-color:${effectColors[e] || '#334155'};">${e}</span>`).join('')}
        ${item.products.map(p => `<span class="card-tag">${p}</span>`).join('')}
      </div>
    </div>
  `;
}

function renderGrid() {
  const data = getFilteredData();
  const grid = document.getElementById('gridView');
  if (data.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">未找到匹配的案例</div>';
  } else {
    grid.innerHTML = data.map(item => renderCard(item)).join('');
  }
  grid.style.display = 'grid';
  document.getElementById('tableView').style.display = 'none';
}

function renderTable() {
  const data = getFilteredData();
  const table = document.getElementById('tableView');
  if (data.length === 0) {
    table.innerHTML = '<div class="empty-state">未找到匹配的案例</div>';
  } else {
    table.innerHTML = `
      <table>
        <thead><tr>
          <th>企业</th><th>场景</th><th>行业</th><th>效果指标</th><th>AI 产品</th><th>效果类型</th>
        </tr></thead>
        <tbody>
          ${data.map(d => `
            <tr onclick="openModal(${d.id})">
              <td><strong>${d.company}</strong></td>
              <td>${d.scene}</td>
              <td><span style="color:${industryColors[d.industry]||'#e2e8f0'};">${d.industry}</span></td>
              <td>${d.effectText}</td>
              <td>${d.products.join(', ')}</td>
              <td>${d.effects.join(', ')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }
  document.getElementById('gridView').style.display = 'none';
  table.style.display = 'block';
}

function renderAll() {
  if (currentView === 'grid') renderGrid(); else renderTable();
}

function openModal(id) {
  const item = caseData.find(d => d.id === id);
  if (!item) return;
  const color = industryColors[item.industry] || '#38bdf8';
  document.getElementById('modalTitle').textContent = item.company;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">场景</div>
      <div class="modal-section-content">${item.scene}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">行业</div>
      <div class="modal-section-content"><span class="modal-tag" style="color:${color};border-color:${color};">${item.industry}</span></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">核心效果</div>
      <div class="modal-section-content" style="font-weight:600;color:#38bdf8;">${item.effectText}</div>
      <div class="modal-section-content" style="margin-top:4px;">${item.effectDetail}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">使用的 AI 产品</div>
      <div class="modal-section-content">${item.products.map(p => `<span class="modal-tag">${p}</span>`).join('')}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">效果标签</div>
      <div class="modal-section-content">${item.effects.map(e => `<span class="modal-tag" style="color:${effectColors[e]||'#94a3b8'};border-color:${effectColors[e]||'#334155'};">${e}</span>`).join('')}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">案例描述</div>
      <div class="modal-section-content">${item.description}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">来源</div>
      <div class="modal-section-content" style="color:#64748b;font-size:0.85rem;">${item.source}</div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  activeIndustry = '全部';
  activeEffect = '全部';
  renderIndustryFilters();
  renderEffectFilters();
  renderAll();
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    renderAll();
  });
});

renderStats();
renderIndustryFilters();
renderEffectFilters();
renderAll();
</script>
</body>
</html>
